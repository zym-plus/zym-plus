<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">zym-plus research dashboard</title>
  <desc id="desc">A unified white dashboard showing the research loop, work focus and tool stack.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="blueGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #0F172A; }
      .text { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #64748B; }
      .scan { animation: scan 4.5s ease-in-out infinite; }
      .tick { animation: fadeTick 3.6s ease-in-out infinite; }
      .tick:nth-child(2) { animation-delay: .45s; }
      .tick:nth-child(3) { animation-delay: .9s; }
      .tick:nth-child(4) { animation-delay: 1.35s; }
      .tick:nth-child(5) { animation-delay: 1.8s; }
      .dot { animation: dotPulse 2.8s ease-in-out infinite; }
      .dot:nth-child(2n) { animation-delay: .6s; }
      @keyframes scan {
        0%, 100% { transform: translateX(0); opacity: .2; }
        50% { transform: translateX(254px); opacity: .55; }
      }
      @keyframes fadeTick {
        0%, 100% { opacity: .38; }
        50% { opacity: 1; }
      }
      @keyframes dotPulse {
        0%, 100% { r: 4; opacity: .45; }
        50% { r: 7; opacity: 1; }
      }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="428" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="54" y="64" class="title" font-size="26" font-weight="760">Research dashboard</text>
  <text x="54" y="92" class="text" font-size="14">A compact view of what matters: loop, signal, stack. No remote image dependency.</text>

  <g filter="url(#shadow)">
    <rect x="54" y="126" width="344" height="238" rx="22" fill="#FFFFFF" stroke="#DBEAFE"/>
    <text x="82" y="166" class="title" font-size="18" font-weight="720">falsification loop</text>
    <text x="82" y="192" class="text" font-size="13">idea quality is measured by how fast it can be killed.</text>
    <g transform="translate(84 224)">
      <rect x="0" y="0" width="252" height="118" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
      <rect class="scan" x="18" y="17" width="54" height="84" rx="12" fill="#DBEAFE"/>
      <g class="tick">
        <circle cx="38" cy="38" r="5" fill="#2563EB"/>
        <text x="56" y="43" class="mono" font-size="12">scan repo</text>
      </g>
      <g class="tick">
        <circle cx="38" cy="62" r="5" fill="#059669"/>
        <text x="56" y="67" class="mono" font-size="12">audit novelty</text>
      </g>
      <g class="tick">
        <circle cx="38" cy="86" r="5" fill="#7C3AED"/>
        <text x="56" y="91" class="mono" font-size="12">smoke test</text>
      </g>
      <path d="M166 38H216M166 62H216M166 86H216" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
      <path d="M210 38L222 50L210 62M210 62L222 74L210 86" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="428" y="126" width="344" height="238" rx="22" fill="#FFFFFF" stroke="#D1FAE5"/>
    <text x="456" y="166" class="title" font-size="18" font-weight="720">current surface</text>
    <text x="456" y="192" class="text" font-size="13">three lanes, one clean signal hierarchy.</text>
    <g transform="translate(456 226)">
      <path d="M0 86 C56 14 102 130 160 58 C206 2 256 104 288 46" stroke="url(#blueGreen)" stroke-width="4" stroke-linecap="round"/>
      <path d="M0 86 C56 14 102 130 160 58 C206 2 256 104 288 46" stroke="url(#blueGreen)" stroke-width="16" stroke-opacity=".08" stroke-linecap="round"/>
      <circle class="dot" cx="0" cy="86" r="5" fill="#2563EB"/>
      <circle class="dot" cx="160" cy="58" r="5" fill="#059669"/>
      <circle class="dot" cx="288" cy="46" r="5" fill="#7C3AED"/>
      <text x="0" y="128" class="mono" font-size="12">forecasting</text>
      <text x="118" y="128" class="mono" font-size="12">vision / 3D</text>
      <text x="230" y="128" class="mono" font-size="12">WSL stack</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="802" y="126" width="344" height="238" rx="22" fill="#FFFFFF" stroke="#EDE9FE"/>
    <text x="830" y="166" class="title" font-size="18" font-weight="720">tool stack</text>
    <text x="830" y="192" class="text" font-size="13">kept small enough to remain operational.</text>
    <g transform="translate(830 224)">
      <rect x="0" y="0" width="88" height="38" rx="12" fill="#EFF6FF" stroke="#DBEAFE"/>
      <text x="21" y="25" class="mono" font-size="12">Python</text>
      <rect x="100" y="0" width="88" height="38" rx="12" fill="#FEF2F2" stroke="#FEE2E2"/>
      <text x="122" y="25" class="mono" font-size="12">Torch</text>
      <rect x="200" y="0" width="88" height="38" rx="12" fill="#F0FDF4" stroke="#DCFCE7"/>
      <text x="224" y="25" class="mono" font-size="12">CUDA</text>

      <rect x="0" y="56" width="88" height="38" rx="12" fill="#F5F3FF" stroke="#EDE9FE"/>
      <text x="22" y="81" class="mono" font-size="12">OpenCV</text>
      <rect x="100" y="56" width="88" height="38" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
      <text x="128" y="81" class="mono" font-size="12">Linux</text>
      <rect x="200" y="56" width="88" height="38" rx="12" fill="#FFF7ED" stroke="#FFEDD5"/>
      <text x="230" y="81" class="mono" font-size="12">WSL</text>
    </g>
  </g>
</svg>
