<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">zym-plus animated research map</title>
  <desc id="desc">A white-background animated visual map for forecasting, vision, 3D reconstruction and WSL tooling.</desc>
  <defs>
    <linearGradient id="rail" x1="132" y1="236" x2="1068" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.38" stop-color="#059669"/>
      <stop offset="0.72" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #111827; }
      .muted { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #64748B; }
      .micro { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #64748B; }
      @media (prefers-reduced-motion: reduce) {
        .pulse, .dash, .node { animation: none !important; }
      }
      .dash {
        stroke-dasharray: 12 18;
        animation: dashMove 12s linear infinite;
      }
      .node {
        transform-origin: center;
        animation: nodeFloat 4s ease-in-out infinite;
      }
      .node:nth-of-type(2) { animation-delay: .35s; }
      .node:nth-of-type(3) { animation-delay: .7s; }
      .node:nth-of-type(4) { animation-delay: 1.05s; }
      .pulse {
        animation: pulse 2.8s ease-in-out infinite;
      }
      @keyframes dashMove { to { stroke-dashoffset: -120; } }
      @keyframes nodeFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: .22; r: 18; }
        50% { opacity: .08; r: 34; }
      }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="418" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
  <path d="M70 344H1130" stroke="#F1F5F9"/>
  <path d="M70 284H1130" stroke="#F8FAFC"/>
  <path d="M70 224H1130" stroke="#F8FAFC"/>

  <text x="72" y="76" class="label" font-size="42" font-weight="750">zym-plus</text>
  <text x="74" y="112" class="muted" font-size="16">AI research engineering, made visible before it becomes a claim.</text>

  <g transform="translate(854 52)">
    <rect width="260" height="70" rx="18" fill="#F8FAFC" stroke="#E5E7EB"/>
    <text x="22" y="30" class="micro" font-size="12">working mode</text>
    <text x="22" y="52" class="label" font-size="18" font-weight="700">hypothesis -> evidence</text>
  </g>

  <path class="dash" d="M132 246 C260 138 392 318 518 222 C640 130 778 324 902 226 C972 170 1026 164 1068 188" stroke="url(#rail)" stroke-width="5" stroke-linecap="round"/>
  <path d="M132 246 C260 138 392 318 518 222 C640 130 778 324 902 226 C972 170 1026 164 1068 188" stroke="url(#rail)" stroke-width="20" stroke-opacity="0.08" stroke-linecap="round"/>

  <g class="node" filter="url(#softShadow)">
    <circle cx="188" cy="230" r="18" fill="#2563EB" opacity="0.18">
      <animate attributeName="r" values="18;34;18" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.22;0.07;0.22" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <rect x="96" y="178" width="184" height="112" rx="22" fill="#FFFFFF" stroke="#DBEAFE"/>
    <circle cx="126" cy="210" r="10" fill="#2563EB"/>
    <text x="148" y="216" class="label" font-size="17" font-weight="700">Forecasting</text>
    <text x="126" y="246" class="muted" font-size="13">baselines, ablation</text>
    <text x="126" y="268" class="micro" font-size="12">TSLib / ETTh1 / scripts</text>
  </g>

  <g class="node" filter="url(#softShadow)">
    <circle cx="444" cy="196" r="18" fill="#059669" opacity="0.18">
      <animate attributeName="r" values="18;34;18" dur="2.8s" begin=".3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.22;0.07;0.22" dur="2.8s" begin=".3s" repeatCount="indefinite"/>
    </circle>
    <rect x="352" y="144" width="184" height="112" rx="22" fill="#FFFFFF" stroke="#D1FAE5"/>
    <circle cx="382" cy="176" r="10" fill="#059669"/>
    <text x="404" y="182" class="label" font-size="17" font-weight="700">Vision</text>
    <text x="382" y="212" class="muted" font-size="13">detect, restore, verify</text>
    <text x="382" y="234" class="micro" font-size="12">YOLO / OpenCV / eval</text>
  </g>

  <g class="node" filter="url(#softShadow)">
    <circle cx="704" cy="250" r="18" fill="#7C3AED" opacity="0.18">
      <animate attributeName="r" values="18;34;18" dur="2.8s" begin=".6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.22;0.07;0.22" dur="2.8s" begin=".6s" repeatCount="indefinite"/>
    </circle>
    <rect x="612" y="198" width="184" height="112" rx="22" fill="#FFFFFF" stroke="#EDE9FE"/>
    <circle cx="642" cy="230" r="10" fill="#7C3AED"/>
    <text x="664" y="236" class="label" font-size="17" font-weight="700">3D</text>
    <text x="642" y="266" class="muted" font-size="13">reconstruct, render</text>
    <text x="642" y="288" class="micro" font-size="12">viewer / deblur / checks</text>
  </g>

  <g class="node" filter="url(#softShadow)">
    <circle cx="970" cy="204" r="18" fill="#F59E0B" opacity="0.18">
      <animate attributeName="r" values="18;34;18" dur="2.8s" begin=".9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.22;0.07;0.22" dur="2.8s" begin=".9s" repeatCount="indefinite"/>
    </circle>
    <rect x="878" y="152" width="184" height="112" rx="22" fill="#FFFFFF" stroke="#FEF3C7"/>
    <circle cx="908" cy="184" r="10" fill="#F59E0B"/>
    <text x="930" y="190" class="label" font-size="17" font-weight="700">WSL stack</text>
    <text x="908" y="220" class="muted" font-size="13">repeatable local work</text>
    <text x="908" y="242" class="micro" font-size="12">GPU / proxy / automation</text>
  </g>

  <text x="74" y="366" class="micro" font-size="12">visual priority: research signal first, text second, claims last</text>
  <text x="820" y="366" class="micro" font-size="12">Python / PyTorch / CUDA / Linux / GitHub Actions</text>
</svg>
