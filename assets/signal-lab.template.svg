<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">ZYM Signal Lab</title>
  <desc id="desc">An animated research console connecting time-series forecasting, open-world perception, reproducible systems, and two small character monitors.</desc>
  <style>
    .canvas { fill: #ffffff; }
    .panel { fill: #f6f8fa; }
    .line { fill: none; stroke: #d0d7de; }
    .ink { fill: #1f2328; }
    .muted { fill: #59636e; }
    .quiet { fill: #8c959f; }
    .blue-fill { fill: #2f81f7; }
    .pink-fill { fill: #d6578b; }
    .green-fill { fill: #2da44e; }
    .yellow-fill { fill: #bf8700; }
    .blue-stroke { stroke: #2f81f7; }
    .pink-stroke { stroke: #d6578b; }
    .green-stroke { stroke: #2da44e; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    .wave {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 10 13;
      animation: wave-flow 10s linear infinite;
    }
    .playhead { animation: playhead 9s cubic-bezier(.45, 0, .2, 1) infinite; }
    .heads { animation: head-bob 5.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .orbit {
      fill: none;
      stroke-width: 2;
      stroke-dasharray: 5 11;
      transform-box: fill-box;
      transform-origin: center;
      animation: orbit 14s linear infinite;
    }
    .led { animation: led 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .meter { animation: meter 1.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .m2 { animation-delay: -.35s; }
    .m3 { animation-delay: -.7s; }
    .m4 { animation-delay: -1.05s; }
    .m5 { animation-delay: -1.4s; }
    .cursor { animation: cursor 1.1s steps(1) infinite; }
    @keyframes wave-flow { to { stroke-dashoffset: -184; } }
    @keyframes playhead { 0%, 8% { transform: translateX(0); opacity: 0; } 14% { opacity: 1; } 88% { opacity: 1; } 94%, 100% { transform: translateX(675px); opacity: 0; } }
    @keyframes head-bob { 0%, 100% { transform: translateY(0) rotate(-.25deg); } 50% { transform: translateY(-7px) rotate(.25deg); } }
    @keyframes orbit { to { transform: rotate(360deg); } }
    @keyframes led { 0%, 100% { opacity: .38; transform: scale(.75); } 50% { opacity: 1; transform: scale(1); } }
    @keyframes meter { 0%, 100% { transform: scaleY(.36); } 45% { transform: scaleY(1); } 75% { transform: scaleY(.62); } }
    @keyframes cursor { 50% { opacity: 0; } }
    @media (prefers-color-scheme: dark) {
      .canvas { fill: #0d1117; }
      .panel { fill: #161b22; }
      .line { stroke: #30363d; }
      .ink { fill: #f0f6fc; }
      .muted { fill: #9da7b3; }
      .quiet { fill: #6e7681; }
      .blue-fill { fill: #58a6ff; }
      .pink-fill { fill: #ff7eb6; }
      .green-fill { fill: #3fb950; }
      .yellow-fill { fill: #d29922; }
      .blue-stroke { stroke: #58a6ff; }
      .pink-stroke { stroke: #ff7eb6; }
      .green-stroke { stroke: #3fb950; }
    }
    @media (prefers-reduced-motion: reduce) {
      .wave, .playhead, .heads, .orbit, .led, .meter, .cursor { animation: none; }
      .playhead { transform: translateX(338px); opacity: .65; }
    }
  </style>

  <rect class="canvas" x="1" y="1" width="1198" height="518" rx="6"/>
  <rect class="line" x="1" y="1" width="1198" height="518" rx="6"/>
  <path class="line" d="M36 64H1164M36 392H1164M790 64V392"/>

  <g class="mono" font-size="14">
    <text class="ink" x="36" y="40" font-weight="700">ZYM / SIGNAL LAB</text>
    <text class="muted" x="600" y="40" text-anchor="middle">AI RESEARCH ENGINEER</text>
    <circle class="green-fill led" cx="1050" cy="35" r="5"/>
    <text class="muted" x="1164" y="40" text-anchor="end">LIVE · UTC+8</text>
  </g>

  <g transform="translate(48 104)">
    <text class="green-fill mono" x="0" y="0" font-size="15">NOISE → SIGNAL</text>
    <text class="ink sans" x="0" y="86" font-size="82" font-weight="750">zym-plus</text>
    <text class="ink sans" x="2" y="132" font-size="24" font-weight="600">I turn uncertain ideas into reproducible evidence.</text>
    <text class="muted mono" x="2" y="170" font-size="15">FORECASTING / OPEN-WORLD PERCEPTION / GPU RESEARCH SYSTEMS</text>

    <g transform="translate(2 224)">
      <rect class="panel" x="0" y="0" width="690" height="74" rx="4"/>
      <path class="line" d="M0 37H690"/>
      <path class="wave blue-stroke" d="M18 37h55l18-15 22 31 23-22 21 11 31-5 24-20 26 39 25-25 29 9 33-4 22-17 28 35 27-22 35 10 30-6 28-18 26 37 24-24 34 9 38-3 28-14 27 29 22-14h39"/>
      <g class="playhead" transform="translate(18 0)">
        <path class="pink-stroke" d="M0 8V66" stroke-width="2"/>
        <circle class="pink-fill" cx="0" cy="37" r="5"/>
      </g>
    </g>
  </g>

  <g transform="translate(818 88)">
    <rect class="panel" x="0" y="0" width="346" height="276" rx="4"/>
    <text class="muted mono" x="18" y="28" font-size="13">SESSION MONITORS / BOCCHI + RYO</text>
    <circle class="pink-stroke orbit" cx="173" cy="139" r="108"/>
    <circle class="blue-stroke orbit" cx="173" cy="139" r="120" style="animation-direction:reverse"/>
    <g class="heads">
      <image href="data:image/png;base64,{{CHARACTER_DATA}}" x="43" y="64" width="260" height="137"/>
    </g>
    <g transform="translate(117 223)">
      <rect class="blue-fill meter" x="0" y="0" width="10" height="26" rx="2"/>
      <rect class="pink-fill meter m2" x="20" y="0" width="10" height="26" rx="2"/>
      <rect class="green-fill meter m3" x="40" y="0" width="10" height="26" rx="2"/>
      <rect class="yellow-fill meter m4" x="60" y="0" width="10" height="26" rx="2"/>
      <rect class="pink-fill meter m5" x="80" y="0" width="10" height="26" rx="2"/>
      <rect class="blue-fill meter m2" x="100" y="0" width="10" height="26" rx="2"/>
    </g>
    <text class="quiet mono" x="173" y="263" font-size="11" text-anchor="middle">MONITORING THE SIGNAL, NOT RUNNING THE SHOW</text>
  </g>

  <g class="mono" transform="translate(48 426)">
    <g>
      <rect class="green-fill" x="0" y="-10" width="8" height="8"/>
      <text class="ink" x="18" y="0" font-size="14">01 FORECAST</text>
      <text class="muted" x="18" y="25" font-size="12">strong baselines / multi-seed</text>
    </g>
    <g transform="translate(292 0)">
      <rect class="blue-fill" x="0" y="-10" width="8" height="8"/>
      <text class="ink" x="18" y="0" font-size="14">02 PERCEIVE</text>
      <text class="muted" x="18" y="25" font-size="12">open world / vision + 3D</text>
    </g>
    <g transform="translate(570 0)">
      <rect class="pink-fill" x="0" y="-10" width="8" height="8"/>
      <text class="ink" x="18" y="0" font-size="14">03 SYSTEMS</text>
      <text class="muted" x="18" y="25" font-size="12">local first / automated</text>
    </g>
    <text class="ink" x="1116" y="0" font-size="13" text-anchor="end">OPEN RESEARCH DECK <tspan class="cursor">↓</tspan></text>
    <text class="quiet" x="1116" y="25" font-size="11" text-anchor="end">CLICK / EXPAND / FOLLOW THE PROOF</text>
  </g>
</svg>
