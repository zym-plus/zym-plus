<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 690" role="img" aria-labelledby="title desc">
  <title id="title">zym-plus mobile research session</title>
  <desc id="desc">A compact animated research setlist with Ryo and Bocchi in a half-pull session card.</desc>
  <defs>
    <clipPath id="character-window"><path d="M330 42H700V370H330Z"/></clipPath>
  </defs>
  <style>
    :root { color-scheme: light dark; }
    .paper { fill: #fbfbf8; }
    .ink { fill: #17181a; }
    .muted { fill: #59636e; }
    .soft-rule { stroke: #d7d9dc; }
    .blue { fill: #2457ff; }
    .pink { fill: #f4518b; }
    .acid { fill: #c6ef42; }
    .yellow { fill: #ffc857; }
    .deck { fill: #17181a; }
    .deck-ink { fill: #fbfbf8; }
    .deck-muted { fill: #aab1bb; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    .character-drawer { animation: drawer-mobile 9s cubic-bezier(.22,1,.36,1) infinite; transform: translate(34px, 22px); transform-origin: 520px 210px; }
    .character-card { fill: #fbfbf8; stroke: #17181a; stroke-width: 1.5; }
    .character-card-edge { fill: #17181a; opacity: .12; }
    .drawer-label { fill: #17181a; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 9px; font-weight: 700; letter-spacing: 0; }
    .character-bob { animation: character-bob 6.4s ease-in-out infinite; transform-origin: 520px 220px; }
    .paper-blue { animation: paper-blue 8s ease-in-out infinite; transform-origin: 520px 190px; }
    .paper-pink { animation: paper-pink 7s ease-in-out infinite; transform-origin: 560px 190px; }
    .cable { fill: none; stroke: #2457ff; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 6 12; animation: cable 9s linear infinite; }
    .cable-pink { stroke: #f4518b; animation-direction: reverse; animation-duration: 12s; }
    .rec { animation: rec 2.2s steps(1) infinite; }
    .level { animation: level 1.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .l2 { animation-delay: -.3s; }
    .l3 { animation-delay: -.65s; }
    .playhead { animation: playhead 8.6s cubic-bezier(.4,0,.2,1) infinite; }
    @keyframes drawer-mobile { 0%,12%,52%,100% { transform: translate(34px, 22px); } 23%,39% { transform: translate(4px, -2px); } }
    @keyframes character-bob { 0%,100% { transform: translateY(0) rotate(-.15deg); } 50% { transform: translateY(-5px) rotate(.18deg); } }
    @keyframes paper-blue { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(.5deg) translateY(-3px); } }
    @keyframes paper-pink { 0%,100% { transform: rotate(2.5deg); } 50% { transform: rotate(.3deg) translateY(3px); } }
    @keyframes cable { to { stroke-dashoffset: -180; } }
    @keyframes rec { 50% { opacity: .28; } }
    @keyframes level { 0%,100% { transform: scaleY(.28); } 42% { transform: scaleY(1); } 72% { transform: scaleY(.58); } }
    @keyframes playhead { 0%,8% { transform: translateX(0); opacity: 0; } 14%,88% { opacity: 1; } 94%,100% { transform: translateX(610px); opacity: 0; } }
    @media (prefers-color-scheme: dark) {
      .paper { fill: #0d1117; }
      .ink { fill: #f0f6fc; }
      .muted { fill: #9da7b3; }
      .soft-rule { stroke: #30363d; }
      .blue { fill: #5b8cff; }
      .pink { fill: #ff78aa; }
      .acid { fill: #d7f75b; }
      .yellow { fill: #ffd166; }
      .cable { stroke: #5b8cff; }
      .cable-pink { stroke: #ff78aa; }
      .deck { fill: #161b22; }
    }
    @media (prefers-reduced-motion: reduce) {
      .character-drawer, .character-bob, .paper-blue, .paper-pink, .cable, .rec, .level, .playhead { animation: none; }
      .playhead { transform: translateX(305px); opacity: .7; }
    }
  </style>

  <rect class="paper" width="720" height="690"/>
  <rect class="blue" width="12" height="370"/>
  <path class="soft-rule" d="M30 52H690"/>
  <g class="mono" font-size="12">
    <text class="ink" x="30" y="32" font-weight="700">ZYM / RESEARCH SETLIST</text>
    <circle class="pink rec" cx="616" cy="27" r="5"/>
    <text class="ink" x="690" y="32" text-anchor="end">REC / UTC+8</text>
  </g>

  <g transform="translate(32 82)">
    <rect class="acid" x="0" y="-18" width="155" height="23"/>
    <text class="ink mono" x="7" y="-2" font-size="11" font-weight="700">NOISE IN / EVIDENCE OUT</text>
    <text class="ink sans" x="0" y="83" font-size="64" font-weight="800">zym-plus</text>
    <text class="ink sans" x="2" y="126" font-size="23" font-weight="700">Ideas that survive hard tests.</text>
    <text class="muted mono" x="2" y="166" font-size="12">FORECAST / PERCEIVE / BUILD</text>
    <text class="muted mono" x="2" y="195" font-size="11">ETTh1 336 -&gt; 336 / YOLO-IOD / GPU OPS</text>
  </g>

  <g clip-path="url(#character-window)">
    <g class="character-drawer">
      <path class="character-card-edge" d="M398 62H694V322H398Z" transform="translate(7 8)"/>
      <path class="blue paper-blue" d="M410 68L665 47L694 284L417 302Z" opacity=".9"/>
      <path class="pink paper-pink" d="M444 76L709 93L688 307L420 292Z" opacity=".82"/>
      <rect class="character-card" x="398" y="62" width="296" height="260"/>
      <rect class="acid" x="414" y="52" width="104" height="22"/>
      <text class="drawer-label" x="424" y="67">SIDE B / PULL</text>
      <path class="cable cable-pink" d="M321 263C379 178 432 317 495 198S611 97 704 157"/>
      <g class="character-bob">
        <image href="data:image/png;base64,{{CHARACTER_DATA}}" x="390" y="70" width="310" height="310"/>
      </g>
    </g>
  </g>
  <g>
    <rect class="paper" x="330" y="238" width="370" height="132"/>
    <path class="soft-rule" d="M350 262H690"/>
    <text class="ink mono" x="690" y="291" text-anchor="end" font-size="10" font-weight="700">RYO + BOCCHI / PEEK TRACK</text>
    <text class="muted mono" x="690" y="312" text-anchor="end" font-size="9">HALF-PULL LOOP / WORK IN FRONT</text>
  </g>

  <g transform="translate(0 370)">
    <rect class="deck" width="720" height="320"/>
    <path d="M30 48H690" stroke="#4d535c"/>
    <path class="cable" d="M30 48C120 18 212 74 305 43S500 22 690 46"/>
    <g class="playhead" transform="translate(35 0)"><path d="M0 27V67" stroke="#f4518b" stroke-width="2"/><circle cx="0" cy="48" r="5" fill="#f4518b"/></g>

    <g transform="translate(30 92)" class="mono">
      <g>
        <rect class="acid" x="0" y="-15" width="122" height="21"/>
        <text x="7" y="0" fill="#17181a" font-size="11" font-weight="700">01 / FORECAST</text>
        <text class="deck-ink" x="0" y="31" font-size="18" font-weight="700">Strong baselines. Small mechanisms.</text>
        <text class="deck-muted" x="0" y="52" font-size="11">fair splits / multi-seed / ablation</text>
      </g>
      <g transform="translate(0 82)">
        <rect class="pink" x="0" y="-15" width="122" height="21"/>
        <text x="7" y="0" fill="#17181a" font-size="11" font-weight="700">02 / PERCEIVE</text>
        <text class="deck-ink" x="0" y="31" font-size="18" font-weight="700">Open worlds. Inspectable results.</text>
        <text class="deck-muted" x="0" y="52" font-size="11">detection / restoration / 3D</text>
      </g>
      <g transform="translate(0 164)">
        <rect class="blue" x="0" y="-15" width="122" height="21"/>
        <text x="7" y="0" fill="#fbfbf8" font-size="11" font-weight="700">03 / SYSTEMS</text>
        <text class="deck-ink" x="0" y="31" font-size="18" font-weight="700">Local first. Repeatable by default.</text>
        <text class="deck-muted" x="0" y="52" font-size="11">GPU runs / tooling / reports</text>
      </g>
    </g>
    <g transform="translate(646 247)">
      <rect class="acid level" x="0" y="22" width="8" height="27"/>
      <rect class="pink level l2" x="14" y="14" width="8" height="35"/>
      <rect class="blue level l3" x="28" y="6" width="8" height="43"/>
    </g>
  </g>
</svg>
