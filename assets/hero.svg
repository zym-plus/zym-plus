<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">zym-plus research engineering profile</title>
  <desc id="desc">A calm signal display connecting time-series forecasting, vision and 3D, and research systems.</desc>
  <style>
    .canvas { fill: #f8f4ef; }
    .frame, .rule, .rail { fill: none; stroke: #ddd5cf; }
    .ink { fill: #171a18; }
    .muted { fill: #5a625c; }
    .quiet { fill: #88918a; }
    .panel { fill: #eef1ec; }
    .green-fill { fill: #2da44e; }
    .blue-fill { fill: #315efb; }
    .coral-fill { fill: #e994b4; }
    .green-stroke { stroke: #2da44e; }
    .blue-stroke { stroke: #315efb; }
    .coral-stroke { stroke: #e994b4; }
    .serif { font-family: Georgia, 'Times New Roman', serif; letter-spacing: 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
    .signal {
      fill: none;
      stroke-width: 2;
      stroke-dasharray: 8 14;
      animation: signal-flow 18s linear infinite;
    }
    .runner { filter: none; }
    .pulse { animation: pulse 4.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .pulse-b { animation-delay: 1.2s; }
    .pulse-c { animation-delay: 2.4s; }
    @keyframes signal-flow { to { stroke-dashoffset: -176; } }
    @keyframes pulse { 0%, 100% { opacity: .42; transform: scale(.8); } 50% { opacity: 1; transform: scale(1); } }
    @media (prefers-color-scheme: dark) {
      .canvas { fill: #151816; }
      .frame, .rule, .rail { stroke: #333a35; }
      .ink { fill: #f2f5ef; }
      .muted { fill: #a8b0a9; }
      .quiet { fill: #7f8981; }
      .panel { fill: #1d211e; }
      .green-fill { fill: #56d364; }
      .green-stroke { stroke: #56d364; }
      .blue-fill { fill: #6f91ff; }
      .blue-stroke { stroke: #6f91ff; }
      .coral-fill { fill: #ff9fc4; }
      .coral-stroke { stroke: #ff9fc4; }
    }
    @media (prefers-reduced-motion: reduce) {
      .signal, .pulse { animation: none; }
      .runner { display: none; }
    }
  </style>

  <rect class="canvas" x="1" y="1" width="1198" height="428" rx="6"/>
  <rect class="frame" x="1" y="1" width="1198" height="428" rx="6"/>
  <path class="rule" d="M48 66H1152M760 66V382"/>

  <g class="mono" font-size="14">
    <text class="muted" x="49" y="43">ZYM / PLUS</text>
    <text class="quiet" x="652" y="43" text-anchor="end">RESEARCH ENGINEERING · CN 2026</text>
    <circle class="green-fill pulse" cx="1138" cy="38" r="5"/>
    <text class="muted" x="1119" y="43" text-anchor="end">ACTIVE LOOP</text>
  </g>

  <g transform="translate(49 0)">
    <text class="ink serif" x="0" y="178" font-size="88" font-weight="700">zym-plus</text>
    <text class="muted serif" x="4" y="224" font-size="24">Research engineering for ideas that can survive a hard test.</text>

    <g class="mono" font-size="15" transform="translate(4 278)">
      <rect class="green-fill" x="0" y="-11" width="8" height="8"/>
      <text class="ink" x="20" y="0">TIME SERIES</text>
      <rect class="blue-fill" x="174" y="-11" width="8" height="8"/>
      <text class="ink" x="194" y="0">VISION + 3D</text>
      <rect class="coral-fill" x="354" y="-11" width="8" height="8"/>
      <text class="ink" x="374" y="0">RESEARCH SYSTEMS</text>
    </g>

    <path class="rule" d="M4 320H655"/>
    <text class="ink mono" x="4" y="354" font-size="16">MECHANISM → EVIDENCE → DECISION</text>
    <text class="quiet mono" x="655" y="354" font-size="13" text-anchor="end">FAST FALSIFICATION / FAIR COMPARISON</text>
  </g>

  <g transform="translate(806 91)">
    <text class="muted mono" x="0" y="0" font-size="14">CURRENT SIGNAL</text>

    <g transform="translate(0 49)">
      <text class="ink mono" x="0" y="0" font-size="16">01 · FORECAST</text>
      <path class="rail" d="M0 24H346"/>
      <path class="signal green-stroke" d="M0 24H346"/>
      <circle class="runner green-fill" cy="24" r="5">
        <animate attributeName="cx" values="0;346" dur="9s" repeatCount="indefinite"/>
      </circle>
      <text class="quiet mono" x="346" y="0" font-size="13" text-anchor="end">BASELINE / ABLATION</text>
    </g>

    <g transform="translate(0 139)">
      <text class="ink mono" x="0" y="0" font-size="16">02 · SEE</text>
      <path class="rail" d="M0 24H346"/>
      <path class="signal blue-stroke" d="M0 24H346"/>
      <circle class="runner blue-fill" cy="24" r="5">
        <animate attributeName="cx" values="0;346" dur="11.5s" repeatCount="indefinite"/>
      </circle>
      <text class="quiet mono" x="346" y="0" font-size="13" text-anchor="end">RENDER / VERIFY</text>
    </g>

    <g transform="translate(0 229)">
      <text class="ink mono" x="0" y="0" font-size="16">03 · REPEAT</text>
      <path class="rail" d="M0 24H346"/>
      <path class="signal coral-stroke" d="M0 24H346"/>
      <circle class="runner coral-fill" cy="24" r="5">
        <animate attributeName="cx" values="0;346" dur="14s" repeatCount="indefinite"/>
      </circle>
      <text class="quiet mono" x="346" y="0" font-size="13" text-anchor="end">SCRIPT / INSPECT</text>
    </g>
  </g>
</svg>
