<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3D GitHub contribution terrain</title>
  <desc id="desc">Temporary white 3D contribution terrain preview. GitHub Actions replaces this with the generated contribution calendar.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .bar { animation: rise 3s ease-in-out infinite; transform-origin: bottom; }
      .bar:nth-child(2n) { animation-delay: .25s; }
      .bar:nth-child(3n) { animation-delay: .55s; }
      .glide { animation: glide 7s ease-in-out infinite; }
      @keyframes rise {
        0%, 100% { transform: scaleY(.72); opacity: .68; }
        50% { transform: scaleY(1); opacity: 1; }
      }
      @keyframes glide {
        0%, 100% { transform: translateX(0); opacity: .18; }
        50% { transform: translateX(160px); opacity: .4; }
      }
    </style>
  </defs>
  <rect x="1" y="1" width="998" height="298" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="48" y="58" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="750">3D contribution terrain</text>
  <text x="48" y="86" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Generated by yoshi389111/github-profile-3d-contrib after the workflow runs.</text>
  <g filter="url(#shadow)" transform="translate(72 118)">
    <path d="M48 108 L258 24 L806 58 L572 168 Z" fill="#F8FAFC" stroke="#CBD5E1"/>
    <path d="M98 98 L276 42 L744 66 L558 148 Z" fill="#ECFDF5" stroke="#86EFAC"/>
    <path class="glide" d="M118 96 L286 46 L420 54 L250 108 Z" fill="#DBEAFE"/>
    <rect class="bar" x="240" y="84" width="20" height="56" fill="#86EFAC"/>
    <rect class="bar" x="310" y="74" width="20" height="70" fill="#22C55E"/>
    <rect class="bar" x="406" y="84" width="20" height="46" fill="#BBF7D0"/>
    <rect class="bar" x="502" y="64" width="20" height="84" fill="#16A34A"/>
    <rect class="bar" x="612" y="78" width="20" height="62" fill="#4ADE80"/>
    <rect class="bar" x="702" y="66" width="20" height="80" fill="#15803D"/>
  </g>
</svg>
