<svg width="1000" height="280" viewBox="0 0 1000 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3D contribution placeholder</title>
  <desc id="desc">A white placeholder that will be replaced by github-profile-3d-contrib after GitHub Actions runs.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .bar { animation: rise 2.8s ease-in-out infinite; transform-origin: bottom; }
      .bar:nth-child(2n) { animation-delay: .3s; }
      .bar:nth-child(3n) { animation-delay: .65s; }
      @keyframes rise {
        0%, 100% { transform: scaleY(.75); opacity: .68; }
        50% { transform: scaleY(1); opacity: 1; }
      }
    </style>
  </defs>
  <rect x="1" y="1" width="998" height="278" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="48" y="58" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="750">Contribution terrain</text>
  <text x="48" y="86" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">This white preview is replaced automatically after the 3D contribution workflow runs.</text>
  <g filter="url(#shadow)" transform="translate(80 124)">
    <path d="M30 92 L240 16 L770 58 L548 150 Z" fill="#F8FAFC" stroke="#E2E8F0"/>
    <path d="M80 86 L252 30 L714 62 L540 132 Z" fill="#ECFDF5" stroke="#BBF7D0"/>
    <rect class="bar" x="238" y="72" width="18" height="44" fill="#86EFAC"/>
    <rect class="bar" x="292" y="70" width="18" height="52" fill="#22C55E"/>
    <rect class="bar" x="366" y="78" width="18" height="36" fill="#BBF7D0"/>
    <rect class="bar" x="454" y="62" width="18" height="66" fill="#16A34A"/>
    <rect class="bar" x="530" y="74" width="18" height="46" fill="#4ADE80"/>
    <rect class="bar" x="606" y="66" width="18" height="58" fill="#15803D"/>
  </g>
</svg>
